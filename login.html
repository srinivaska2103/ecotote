<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='currentColor'><path d='M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z'/></svg>">
    <title>Login - EcoTote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importing Heroicons for professional look -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#0d9488' } } } }
    </script>
    <script>
    tailwind.config = {
        darkMode: 'class', // <--- ADD THIS LINE
        theme: {
            extend: {
                colors: { primary: '#0d9488' }
            }
        }
    }
</script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <a href="index.html" class="flex items-center gap-2">
            <svg class="w-8 h-8 text-primary" fill="currentColor" viewBox="0 0 24 24"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z" /></svg>
            <span class="text-xl lg:text-2xl font-bold text-primary tracking-tight">EcoTote</span>
        </a>
        <div class="flex gap-3">
                <button id="themeToggle" class="w-10 h-10 rounded-lg border border-slate-300 dark:border-slate-600 flex items-center justify-center transition-all hover:bg-slate-100 dark:hover:bg-slate-800">
                    <span id="themeIcon">🌙</span>
                </button>
                <button id="rtlToggle" 
        class="w-10 h-10 rounded-lg border 
               border-slate-300 dark:border-slate-600 
               text-slate-800 dark:text-slate-100 
               flex items-center justify-center transition-all 
               hover:bg-slate-100 dark:hover:bg-slate-700 
               text-xs font-bold uppercase">
    LTR
</button>
            </div>
        </div>
    </nav>

   <main class="flex items-center justify-center p-4">
        <div class="w-full max-w-lg bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-2xl border border-slate-100 dark:border-slate-800">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Wholesale Partner Portal</h2>
                <p class="text-slate-500 mt-2">Apply for wholesale access to EcoTote products.</p>
            </div>
            
            <form class="space-y-5">
                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Company Name</label>
                    <input type="text" placeholder="Enter your business name" class="w-full p-4 rounded-xl border border-slate-200 dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary/50">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">GST Number</label>
                    <input type="text" placeholder="00AAAAA0000A1Z5" class="w-full p-4 rounded-xl border border-slate-200 dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary/50">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 dark:text-slate-300">Trade License Document</label>
                    <div class="w-full p-4 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl text-center hover:border-primary transition-colors cursor-pointer group">
                        <input type="file" class="hidden" id="licenseUpload">
                        <label for="licenseUpload" class="cursor-pointer">
                            <i data-lucide="upload-cloud" class="w-8 h-8 text-slate-400 mx-auto mb-2 group-hover:text-primary"></i>
                            <span class="text-sm text-slate-500">Upload PDF or Image (Max 5MB)</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="w-full bg-primary text-white py-4 rounded-xl font-bold hover:bg-teal-700 transition-all shadow-lg shadow-primary/20">Submit Application</button>
            </form>

            <p class="text-center text-sm text-slate-600 dark:text-slate-400 mt-6">
                Already have an account? <a href="signup.html" class="text-primary font-bold hover:underline">Sign in</a>
            </p>
        </div>
    </main>

  <script>
    // Initialize Icons
    lucide.createIcons();

    const htmlElement = document.documentElement;

    // --- Theme Toggle Logic ---
    const updateThemeIcon = (isDark, iconElement) => {
        if (iconElement) iconElement.innerText = isDark ? '☀️' : '🌙';
    };

    const setupThemeToggle = (btnId, iconId) => {
        const btn = document.getElementById(btnId);
        const icon = document.getElementById(iconId);
        if (!btn) return;

        // Apply saved theme on load
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
            updateThemeIcon(true, icon);
        }

        btn.addEventListener('click', () => {
            const isDark = htmlElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            updateThemeIcon(isDark, icon);
        });
    };

    setupThemeToggle('themeToggle', 'themeIcon');
    setupThemeToggle('mobileThemeToggle', 'mobileThemeIcon');

    // --- RTL Toggle Logic ---
    const setupRtlToggle = (btnId) => {
        const btn = document.getElementById(btnId);
        if (!btn) return;

        // Apply saved direction
        if (localStorage.dir) {
            htmlElement.dir = localStorage.dir;
            btn.innerText = localStorage.dir.toUpperCase();
        }

        btn.addEventListener('click', () => {
            const newDir = htmlElement.dir === 'rtl' ? 'ltr' : 'rtl';
            htmlElement.dir = newDir;
            localStorage.dir = newDir;
            btn.innerText = newDir.toUpperCase();
            
            // Sync other button if it exists
            const otherBtn = (btnId === 'rtlToggle') ? document.getElementById('mobileRtlToggle') : document.getElementById('rtlToggle');
            if (otherBtn) otherBtn.innerText = newDir.toUpperCase();
        });
    };

    setupRtlToggle('rtlToggle');
    setupRtlToggle('mobileRtlToggle');

    // --- Password Toggle Logic ---
    function togglePassword() {
        const p = document.getElementById('password');
        const eye = document.getElementById('eyeIcon');
        if (!p || !eye) return;

        const isPassword = p.type === 'password';
        p.type = isPassword ? 'text' : 'password';
        
        eye.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
        lucide.createIcons(); 
    }
</script>
</body>
</html>
