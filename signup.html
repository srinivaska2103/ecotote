<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='currentColor'><path d='M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z'/></svg>">
    <title>Sign Up - EcoTote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#0d9488' } } }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 transition-colors duration-300">

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <a href="index.html" class="flex items-center gap-2">
            <svg class="w-8 h-8 text-primary" fill="currentColor" viewBox="0 0 24 24"><path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z" /></svg>
            <span class="text-xl lg:text-2xl font-bold text-primary tracking-tight">EcoTote</span>
        </a>
        <div class="flex gap-3">
            <button id="themeToggle" class="w-10 h-10 rounded-lg border border-slate-300 dark:border-slate-600 flex items-center justify-center transition-all hover:bg-slate-100 dark:hover:bg-slate-800">
                <span id="themeIcon">🌙</span>
            </button>
            <button id="rtlToggle" 
        class="w-10 h-10 rounded-lg border 
               border-slate-300 dark:border-slate-600 
               text-slate-800 dark:text-slate-100 
               flex items-center justify-center transition-all 
               hover:bg-slate-100 dark:hover:bg-slate-700 
               text-xs font-bold uppercase">
    LTR
</button>
        </div>
    </nav>

  <main class="flex items-center justify-center p-4 min-h-[70vh]">
    <div class="w-full max-w-lg bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-2xl border border-slate-100 dark:border-slate-800 transition-colors">
        
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Create an Account</h2>
            <p class="text-slate-500 mt-2">Join our wholesale partner network today.</p>
        </div>
        
        <form class="space-y-5">
            <div>
                <label class="block text-sm font-medium mb-1 dark:text-slate-300">Full Name</label>
                <input type="text" placeholder="John Doe" class="w-full p-4 rounded-xl border border-slate-200 dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary/50 dark:text-white transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 dark:text-slate-300">Email Address</label>
                <input type="email" placeholder="partner@company.com" class="w-full p-4 rounded-xl border border-slate-200 dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary/50 dark:text-white transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 dark:text-slate-300">Password</label>
                <div class="relative">
                    <input type="password" id="password" placeholder="••••••••" class="w-full p-4 rounded-xl border border-slate-200 dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary/50 dark:text-white transition-all">
                    <button type="button" onclick="togglePassword()" class="absolute inset-y-0 end-0 flex items-center px-4 text-slate-400 hover:text-primary">
                        <i id="eyeIcon" data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 dark:text-slate-300">Confirm Password</label>
                <input type="password" placeholder="••••••••" class="w-full p-4 rounded-xl border border-slate-200 dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary/50 dark:text-white transition-all">
            </div>

            <label class="flex items-center gap-2 text-sm text-slate-600 dark:text-slate-400">
                <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-primary focus:ring-primary">
                I agree to the <a href="#" class="text-primary font-bold hover:underline">Terms & Conditions</a>
            </label>

            <button type="submit" class="w-full bg-primary text-white py-4 rounded-xl font-bold hover:bg-teal-700 transition-all shadow-lg shadow-primary/20">Create Account</button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-2 bg-white dark:bg-slate-900 text-slate-500">Or sign up with</span>
            </div>
        </div>

           <!-- Social Buttons -->
    <div class="grid grid-cols-3 gap-3">
    <button class="flex justify-center p-3 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="text-slate-600 dark:text-slate-300" viewBox="0 0 16 16">
            <path d="M15.545 6.558a9.4 9.4 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.7 7.7 0 0 1 5.352 2.082l-2.284 2.284A4.35 4.35 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.8 4.8 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.7 3.7 0 0 0 1.599-2.431H8v-3.08z"/>
        </svg>
    </button>
    
    <button class="flex justify-center p-3 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="text-blue-600" viewBox="0 0 16 16">
            <path d="M16 8.049c0-4.446-3.582-8.05-8-8.05C3.58 0-.002 3.603-.002 8.05c0 4.017 2.926 7.347 6.75 7.951v-5.625h-2.03V8.05H6.75V6.275c0-2.017 1.195-3.131 3.022-3.131.876 0 1.791.157 1.791.157v1.98h-1.009c-.993 0-1.303.621-1.303 1.258v1.51h2.218l-.354 2.326H9.25V16c3.824-.604 6.75-3.934 6.75-7.951"/>
        </svg>
    </button>
    
    <button class="flex justify-center p-3 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="text-slate-900 dark:text-white" viewBox="0 0 16 16">
            <path d="M11.182.008C11.148-.03 9.923.023 8.857 1.18c-1.066 1.156-.902 2.482-.878 2.516s1.52.087 2.475-1.258.762-2.391.728-2.43m3.314 11.733c-.048-.096-2.325-1.234-2.113-3.422s1.675-2.789 1.698-2.854-.597-.79-1.254-1.157a3.7 3.7 0 0 0-1.563-.434c-.108-.003-.483-.095-1.254.116-.508.139-1.653.589-1.968.607-.316.018-1.256-.522-2.267-.665-.647-.125-1.333.131-1.824.328-.49.196-1.422.754-2.074 2.237-.652 1.482-.311 3.83-.067 4.56s.625 1.924 1.273 2.796c.576.984 1.34 1.667 1.659 1.899s1.219.386 1.843.067c.502-.308 1.408-.485 1.766-.472.357.013 1.061.154 1.782.539.571.197 1.111.115 1.652-.105.541-.221 1.324-1.059 2.238-2.758q.52-1.185.473-1.282"/>
        </svg>
    </button>
</div>

        <p class="text-center text-sm text-slate-600 dark:text-slate-400 mt-8">
            Already have an account? <a href="login.html" class="text-primary font-bold hover:underline">Sign in</a>
        </p>
    </div>
</main>

    <script>
        lucide.createIcons();
        const htmlElement = document.documentElement;
        
        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        if(localStorage.theme === 'dark') { htmlElement.classList.add('dark'); themeIcon.innerText = '☀️'; }
        themeToggle.addEventListener('click', () => {
            const isDark = htmlElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            themeIcon.innerText = isDark ? '☀️' : '🌙';
        });

        // RTL Toggle
        const rtlToggle = document.getElementById('rtlToggle');
        if(localStorage.dir) { htmlElement.dir = localStorage.dir; rtlToggle.innerText = localStorage.dir.toUpperCase(); }
        rtlToggle.addEventListener('click', () => {
            const newDir = htmlElement.dir === 'rtl' ? 'ltr' : 'rtl';
            htmlElement.dir = newDir;
            localStorage.dir = newDir;
            rtlToggle.innerText = newDir.toUpperCase();
        });

        // Password Toggle
        function togglePassword() {
            const p = document.getElementById('password');
            const eye = document.getElementById('eyeIcon');
            p.type = p.type === 'password' ? 'text' : 'password';
            eye.setAttribute('data-lucide', p.type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        }
    </script>
</body>
</html>
